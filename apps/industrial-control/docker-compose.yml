version: '3.8'

services:
  # Interfaz Gráfica Gopilot
  gopilot-frontend:
    build: .
    ports:
      - "3000:3000"
    restart: always
    networks:
      - gopilot-net

  # Broker MQTT para telemetría (Sensores/Motores)
  mqtt-broker:
    image: eclipse-mosquitto:latest
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: always
    networks:
      - gopilot-net

  # Motor de IA para Jarvis Local
  jarvis-ai:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: always
    networks:
      - gopilot-net

networks:
  gopilot-net:
    driver: bridge

volumes:
  ollama-data:
